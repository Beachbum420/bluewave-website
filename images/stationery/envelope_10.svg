<?xml version="1.0" encoding="UTF-8"?>
<!-- #10 Envelope — 9.5" x 4.125" at 72dpi (684px x 297px) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 684 297" width="684" height="297">
