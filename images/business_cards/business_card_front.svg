<?xml version="1.0" encoding="UTF-8"?>
<!-- Business Card FRONT — 3.625" x 2.125" with 0.125" bleed (1088px x 638px at 300dpi) -->
<!-- Trim line at 1050x600. Safe zone inset 0.125" from trim. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1088 638" width="1088" height="638">
  <title>Blue Wave Construction - Business Card Front</title>
  <!-- Bleed background -->
  <rect width="1088" height="638" fill="#F5EFE4"/>
  <!-- Centered logo block -->
  <g transform="translate(544, 280)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter Tight, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="76" fill="#0A2540" letter-spacing="14">BLUE WAVE</text>
    <path d="M -130 38 Q -95 26, -60 38 T 10 38 T 80 38 T 130 38" stroke="#1B6CA8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="80" text-anchor="middle" font-family="Inter Tight, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="13" fill="#0A2540" letter-spacing="22">CONSTRUCTION</text>
  </g>
  <!-- Bottom-left tagline -->
  <text x="80" y="560" font-family="JetBrains Mono, monospace" font-size="14" fill="#0A2540" opacity="0.6" letter-spacing="3">SOUTH BAY · CALIFORNIA</text>
  <!-- Bottom-right small wave -->
  <path d="M 880 555 Q 905 547, 930 555 T 980 555" stroke="#1B6CA8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
