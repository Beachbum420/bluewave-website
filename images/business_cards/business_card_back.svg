<?xml version="1.0" encoding="UTF-8"?>
<!-- Business Card BACK — 3.625" x 2.125" with 0.125" bleed -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1088 638" width="1088" height="638">
  <title>Blue Wave Construction - Business Card Back</title>
  <!-- Navy bleed background -->
  <rect width="1088" height="638" fill="#0A2540"/>
  <!-- Subtle wave watermark, top-right -->
  <g opacity="0.12">
    <path d="M 600 80 Q 680 50, 760 80 T 920 80 T 1080 80" stroke="#4FA3D1" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 600 130 Q 680 100, 760 130 T 920 130 T 1080 130" stroke="#4FA3D1" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 600 180 Q 680 150, 760 180 T 920 180 T 1080 180" stroke="#4FA3D1" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Name block, left -->
  <text x="80" y="180" font-family="Inter Tight, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="44" fill="#F5EFE4" letter-spacing="0">RYAN VERBIEST</text>
  <text x="80" y="225" font-family="Inter Tight, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#4FA3D1" letter-spacing="6">FOUNDER · GENERAL CONTRACTOR</text>
  <!-- Divider -->
  <line x1="80" y1="290" x2="1010" y2="290" stroke="#E8D9B8" stroke-width="0.5" opacity="0.4"/>
  <!-- Contact -->
  <text x="80" y="350" font-family="JetBrains Mono, monospace" font-size="20" fill="#F5EFE4" letter-spacing="1">(310) 995-7741</text>
  <text x="80" y="385" font-family="JetBrains Mono, monospace" font-size="20" fill="#F5EFE4" letter-spacing="1">RYAN@BLUEWAVECONSTRUCTION.LA</text>
  <text x="80" y="420" font-family="JetBrains Mono, monospace" font-size="20" fill="#F5EFE4" letter-spacing="1">BLUEWAVECONSTRUCTION.LA</text>
  <!-- Bottom row: licenses -->
  <text x="80" y="555" font-family="JetBrains Mono, monospace" font-size="13" fill="#E8D9B8" opacity="0.7" letter-spacing="2">CSLB #1153965 · DRE #02185763</text>
  <text x="1010" y="555" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#E8D9B8" opacity="0.7" letter-spacing="3">SOUTH BAY · CA</text>
</svg>
